# ──────────────────────────────────────────────
# Tools
# ──────────────────────────────────────────────
[tools]
rust = { version = "1.96", components = "rustfmt,clippy" }

# Python
python = "3.11"
uv = "0.11"
zig = "0.16"
node = "24"
oxfmt = "0.53"
"cargo:maturin" = "1.13"
"cargo:cargo-zigbuild" = "0.22"
"cargo:cargo-deny" = "0.19"
"cargo:cargo-audit" = "0.22"
"cargo:typos-cli" = "1.40"
"cargo:cargo-machete" = "0.9"

# Protobuf
protoc = "35"
buf = "1.70"

# Hooks
prek = "0.4"
fnox = "1.25"

[settings]
python.uv_venv_auto = "create|source"
task.run_auto_install = false

[env]
UV_PYTHON = { value = "{{ tools.python.path }}", tools = true }
UV_CACHE_DIR = "target/uv-cache"
CARGO_HTTP_MULTIPLEXING = "false"

# ──────────────────────────────────────────────
# Setup
# ──────────────────────────────────────────────
[tasks."setup"]
description = "Install tools, Python dev dependencies, and git hooks"
depends = ["setup:python", "setup:hooks"]

[tasks."setup:python"]
description = "Sync Python dev environment"
run = "uv sync --group dev"

[tasks."setup:python:release"]
description = "Install additional Python interpreters used for release wheel builds"
run = "mise install python@3.10"

[tasks."setup:hooks"]
description = "Install git hooks"
run = "prek install"

[tasks."setup:rust:targets"]
description = "Install Rust targets used for release wheel builds"
run = "rustup target add aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-unknown-linux-musl aarch64-unknown-linux-musl x86_64-pc-windows-msvc"

# ──────────────────────────────────────────────
# Format (mutating)
# ──────────────────────────────────────────────
[tasks."fmt"]
description = "Format all source files"
depends = ["fmt:rust", "fmt:python", "fmt:proto", "fmt:oxfmt"]

[tasks."fmt:rust"]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks."fmt:python"]
description = "Format Python code"
run = "uv run ruff format"

[tasks."fmt:proto"]
description = "Format Protobuf definitions"
run = "buf format -w"

[tasks."fmt:oxfmt"]
description = "Format Markdown, TOML, YAML, and JSON files with oxfmt"
run = "git ls-files -z --cached --others --exclude-standard -- '*.md' '*.toml' '*.yml' '*.yaml' '*.json' '*.jsonc' | xargs -0 oxfmt --write"

# ──────────────────────────────────────────────
# Format checks (non-mutating)
# ──────────────────────────────────────────────
[tasks."fmt:check"]
description = "Check formatting without modifying files"
depends = ["fmt:check:rust", "fmt:check:python", "fmt:check:proto", "fmt:check:oxfmt"]

[tasks."fmt:check:rust"]
description = "Check Rust formatting"
run = "cargo fmt --all --check"

[tasks."fmt:check:python"]
description = "Check Python formatting"
run = "uv run ruff format --check"

[tasks."fmt:check:proto"]
description = "Check Protobuf formatting"
run = "buf format -d --exit-code"

[tasks."fmt:check:oxfmt"]
description = "Check Markdown, TOML, YAML, and JSON formatting with oxfmt"
run = "git ls-files -z --cached --others --exclude-standard -- '*.md' '*.toml' '*.yml' '*.yaml' '*.json' '*.jsonc' | xargs -0 oxfmt --check"

# ──────────────────────────────────────────────
# Fix (mutating)
# ──────────────────────────────────────────────
[tasks."fix"]
description = "Apply safe auto-fixes and format all source files"
depends = ["fix:rust", "fix:python", "fmt"]

[tasks."fix:rust"]
description = "Apply safe Rust fixes"
env = { CARGO_TARGET_DIR = "target/clippy", CARGO_INCREMENTAL = "0" }
run = "cargo clippy --workspace --all-targets --fix --allow-dirty --allow-staged --allow-no-vcs -- -D warnings"

[tasks."fix:python"]
description = "Apply safe Python lint fixes"
run = "uv run ruff check --fix"

# ──────────────────────────────────────────────
# Lint (non-mutating)
# ──────────────────────────────────────────────
[tasks."lint"]
description = "Lint source files without modifying them"
depends = ["lint:rust", "lint:python", "lint:proto", "lint:spelling", "lint:deps"]

[tasks."lint:rust"]
description = "Lint Rust code"
env = { CARGO_TARGET_DIR = "target/clippy", CARGO_INCREMENTAL = "0" }
run = "cargo clippy --workspace --all-targets -- -D warnings"

[tasks."lint:python"]
description = "Lint Python code"
run = "uv run ruff check"

[tasks."lint:proto"]
description = "Lint Protobuf definitions"
run = "buf lint"

[tasks."lint:spelling"]
description = "Check spelling in source files"
run = "typos"

[tasks."lint:deps"]
description = "Check Rust dependency advisories, licenses, bans, and sources"
run = ["mise run lint:deps:audit", "mise run lint:deps:deny", "mise run lint:deps:unused"]

[tasks."lint:deps:audit"]
description = "Check Rust dependency advisories"
run = "cargo audit"

[tasks."lint:deps:deny"]
description = "Check Rust dependency licenses, bans, and sources"
run = "cargo deny check licenses bans sources"

[tasks."lint:deps:duplicates"]
description = "Report duplicate Rust dependency versions without failing"
run = "cargo tree -d --workspace"

[tasks."lint:deps:unused"]
description = "Check for unused Rust dependencies"
run = "cargo machete --with-metadata"

# ──────────────────────────────────────────────
# Typecheck (non-mutating)
# ──────────────────────────────────────────────
[tasks."typecheck"]
description = "Typecheck all supported language bindings"
depends = ["typecheck:python"]

[tasks."typecheck:python"]
description = "Typecheck Python code"
run = "uv run basedpyright"

# ──────────────────────────────────────────────
# Docs (non-mutating)
# ──────────────────────────────────────────────
[tasks."docs:build"]
description = "Build the Sphinx docs site with warnings denied"
env = { UV_CACHE_DIR = "target/uv-cache" }
run = "uv run --only-group docs sphinx-build -E -a -b dirhtml -W --keep-going docs site"

[tasks."docs:serve"]
description = "Serve the Sphinx docs site locally"
env = { UV_CACHE_DIR = "target/uv-cache" }
run = "uv run --only-group docs sphinx-autobuild -b dirhtml docs site"

[tasks."docs:rust:check"]
description = "Build Rust library docs with warnings denied"
env = { RUSTDOCFLAGS = "-D warnings" }
run = "cargo doc --workspace --no-deps --lib"

# ──────────────────────────────────────────────
# Native Python stubs
# ──────────────────────────────────────────────
# The stub_gen bin declares `stub-gen` via required-features, so this task must
# pass it explicitly.
[tasks."stubs:generate"]
description = "Generate native Python stubs"
run = "cargo run --manifest-path python/rlmesh/rust/Cargo.toml --features stub-gen --bin stub_gen"

[tasks."stubs:check"]
description = "Check generated native Python stubs without modifying files"
run = "cargo run --manifest-path python/rlmesh/rust/Cargo.toml --features stub-gen --bin stub_gen -- --check"

# ──────────────────────────────────────────────
# Compatibility policy (non-mutating)
# ──────────────────────────────────────────────
[tasks."policy:check"]
description = "Check rlmesh.toml, artifact versions, and compatibility constants"
run = "python scripts/check_rlmesh_policy.py"

# ──────────────────────────────────────────────
# Check (non-mutating)
# ──────────────────────────────────────────────
[tasks."check"]
description = "Run non-mutating verification checks"
depends = ["fmt:check", "lint", "typecheck", "docs:rust:check", "stubs:check", "policy:check"]

# ──────────────────────────────────────────────
# Test
# ──────────────────────────────────────────────
[tasks."test"]
description = "Run Rust tests plus Python unit and integration tests"
depends = ["test:rust", "test:python"]

[tasks."test:rust"]
description = "Run Rust workspace tests"
run = "cargo test --workspace --all-targets"

[tasks."test:python"]
description = "Run Python unit, integration, and conformance tests"
run = "uv run pytest python/rlmesh/tests/unit python/rlmesh/tests/integration python/rlmesh/tests/conformance -q"

[tasks."test:python:unit"]
description = "Run Python unit tests"
run = "uv run pytest python/rlmesh/tests/unit -q"

[tasks."test:python:integration"]
description = "Run Python integration tests"
run = "uv run pytest python/rlmesh/tests/integration -q"

[tasks."test:python:conformance"]
description = "Run Python adapter-spec conformance vectors (cross-engine parity gate)"
run = "uv run pytest python/rlmesh/tests/conformance -q"

[tasks."test:python:api-surface"]
description = "Run Python API surface tests"
run = "uv run pytest python/rlmesh/tests/api_surface -q"

[tasks."test:system:harness"]
description = "Run system test runner and fixture tests"
run = "uv run pytest tools/rlmesh_system/tests tools/rlmesh_system_fixtures/tests -q"

[tasks."test:system:list"]
description = "List installed-artifact system profiles and scenarios"
run = "uv run rlmesh-system list"

[tasks."test:system"]
description = "Run basic installed-artifact system scenarios against python/rlmesh/dist"
run = "uv run rlmesh-system run"

[tasks."test:system:heavy"]
description = "Run heavy installed-artifact system scenarios against python/rlmesh/dist"
run = "uv run rlmesh-system run --profile heavy"

[tasks."perf:baseline"]
description = "Capture the local tensor-conversion performance baseline (perf profile)"
run = [
  "uv run rlmesh-system run --profile perf --kind artifact",
  "bash -c 'cp \"$(ls -t target/python-validation/reports/validation-*.json | head -1)\" target/python-validation/perf-baseline.json && echo baseline=target/python-validation/perf-baseline.json'",
]

[tasks."perf:check"]
description = "Re-run the perf profile and fail on drift against the local baseline"
run = "uv run rlmesh-system run --profile perf --kind artifact --baseline target/python-validation/perf-baseline.json --fail-on-regression"

[tasks."test:system:clean"]
description = "Remove installed-artifact system venvs, logs, and reports"
run = "uv run rlmesh-system clean"

# ──────────────────────────────────────────────
# Build
# ──────────────────────────────────────────────
[tasks."build"]
description = "Build local Rust workspace and current-platform Python wheels"
run = ["mise run build:rust", "mise run build:python"]

[tasks."build:rust"]
description = "Build Rust workspace"
run = "cargo build --workspace"

[tasks."build:python"]
description = "Build current-platform Python wheels"
run = ["mise run stubs:generate", "mise run build:python:local"]

[tasks."build:python:local"]
description = "Build current-platform Python wheels"
run = [
  "mise run setup:python:release",
  "mise run build:python:wheel local",
  "python scripts/check_python_wheels.py python/rlmesh/dist --allow-local-platform-tags",
]

# ──────────────────────────────────────────────
# Release wheels
# ──────────────────────────────────────────────
# Full release matrix contains 14 wheels total:
#   Python:  cp310-cp310 and cp311-abi3 for each platform
#   macOS:   arm64, x86_64
#   Linux:   glibc (x86_64, aarch64), musl (x86_64, aarch64)
#   Windows: x86_64

[tasks."release:python:wheels"]
description = "Build release Python wheels supported by the current host"
env = { RLMESH_RELEASE_BUILD = "1" }
run = "case \"$(uname -s)\" in Darwin) mise run release:python:wheels:macos ;; Linux) mise run release:python:wheels:linux ;; *) echo 'unsupported release wheel host; use macOS for the full wheel matrix or Linux for Linux/Windows wheels' >&2; exit 1 ;; esac"

[tasks."release:python:clean"]
description = "Remove previously built Python wheels before a release wheel build"
run = "rm -f python/rlmesh/dist/rlmesh-*.whl"

[tasks."release:python:wheels:macos"]
description = "On macOS, prepare and build the full macOS/Linux/Windows wheel matrix"
run = [
  "test \"$(uname -s)\" = Darwin || { echo 'macOS wheels require a macOS host with Xcode Command Line Tools (xcrun)' >&2; exit 1; }",
  "mise run release:python:prepare",
  "status=0; for task in release:python:build:macos-all release:python:build:linux-all release:python:build:windows-all; do mise run \"$task\" || status=1; done; mise run release:python:check:all || status=1; exit $status",
]

[tasks."release:python:wheels:linux"]
description = "On Linux, prepare and build the Linux/Windows cross-build wheel matrix"
run = [
  "test \"$(uname -s)\" = Linux || { echo 'Linux and Windows release wheels should be built from a Linux host' >&2; exit 1; }",
  "mise run release:python:prepare",
  "status=0; for task in release:python:build:linux-all release:python:build:windows-all; do mise run \"$task\" || status=1; done; mise run release:python:check:linux-windows || status=1; exit $status",
]

[tasks."release:python:prepare"]
description = "Clean dist, install release Python/Rust targets, and generate stubs"
run = [
  "mise run release:python:clean",
  "mise run setup:python:release",
  "mise run setup:rust:targets",
  "mise run stubs:generate",
]

[tasks."release:python:build:macos-all"]
description = "Build macOS arm64 then x86_64 wheels on a Darwin host"
run = "status=0; for target in macos-arm macos-x86; do mise run build:python:wheel \"$target\" || status=1; done; exit $status"

[tasks."release:python:build:linux-all"]
description = "Build Zig-backed Linux glibc/musl x86_64 and aarch64 wheels"
run = "status=0; for target in linux-x86 linux-arm linux-musl-x86 linux-musl-arm; do mise run build:python:wheel \"$target\" || status=1; done; exit $status"

[tasks."release:python:build:windows-all"]
description = "Build Zig-backed Windows x86_64 wheels"
run = "mise run build:python:wheel windows"

[tasks."release:python:check:all"]
description = "Strictly validate the complete macOS/Linux/Windows release wheel matrix"
run = "python scripts/check_python_wheels.py python/rlmesh/dist --platform-set all"

[tasks."release:python:check:linux-windows"]
description = "Strictly validate the Linux/Windows release wheel matrix"
run = "python scripts/check_python_wheels.py python/rlmesh/dist --platform-set linux-windows"

[tasks."release:rust:package"]
description = "Verify Rust crate packages without publishing"
env = { RLMESH_RELEASE_BUILD = "1" }
run = [
  "cargo package -p rlmesh-proto --allow-dirty",
  "cargo package -p rlmesh-spaces --allow-dirty",
  "cargo package -p rlmesh-cli --allow-dirty",
  "cargo package --workspace --allow-dirty --no-verify",
]

[tasks."release:artifacts:licenses"]
description = "Validate release artifact license files before publishing"
run = "python scripts/check_release_artifact_licenses.py"

[tasks."release:check"]
description = "Run the local release gate without publishing"
env = { RLMESH_RELEASE_BUILD = "1" }
run = [
  "mise run check",
  "mise run test",
  "mise run test:python:api-surface",
  "mise run test:system:harness",
  "mise run release:rust:package",
  "mise run build:python",
  "mise run test:system",
  "mise run test:system:heavy",
]

# ──────────────────────────────────────────────
# Versioning + release driver
# ──────────────────────────────────────────────
[tasks.bump]
description = "Bump the version across every manifest (X.Y.Z or X.Y.Z-beta.N)"
run = 'python scripts/bump_version.py {{arg(name="version")}}'

[tasks."changelog:draft"]
description = "Append draft Unreleased changelog bullets from commits since the last release tag"
run = "python scripts/changelog_draft.py"

[tasks.release]
description = "Release driver: bump, gate, tag (pass args after --, e.g. -- 0.2.0 --dry-run)"
run = 'python scripts/release.py {{arg(name="version", var=true)}}'

# Per-target wheel builds live in the parametrized file task
# .mise/tasks/build/python/wheel (task: build:python:wheel <target>).
