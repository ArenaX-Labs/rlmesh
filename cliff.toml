# git-cliff configuration: CHANGELOG.md is generated from conventional commits.
# https://git-cliff.org/docs/configuration
#
# History before rust/v0.1.0-beta.1 is summarized by hand in the footer below,
# so changelog tasks pass the range `rust/v0.1.0-beta.1..HEAD`.

[changelog]
header = """
# Changelog

All notable RLMesh changes are tracked here. Entries are generated from
conventional commit messages with `mise run changelog:build`.
"""
body = """
## {% if version %}{{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}Unreleased{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {% if commit.breaking %}**Breaking:** {% endif %}{% if commit.scope %}{{ commit.scope }}: {% endif %}{{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}
"""
footer = """
## 0.1.0-beta1

Initial OSS beta release.

- Python SDK and native extension package.
- Rust SDK, protocol, runtime, sandbox, and CLI crates.
- Installed-wheel validation harness for basic and optional heavy profiles.
- Public API snapshot tests for the Python package.
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
# Breaking commits stay in the changelog even when their type is skipped.
protect_breaking_commits = true
# Only unified release tags delimit sections; per-ecosystem tags
# (rust/v*, python/v*) are ignored.
tag_pattern = "^v[0-9]"
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Changed" },
  { message = "^docs\\(changelog\\)", skip = true },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^(chore|ci|test|build|style)", skip = true },
]

# Decorates entries with pull request numbers and links. Unauthenticated
# GitHub API calls are rate-limited; set GITHUB_TOKEN if generation fails.
[remote.github]
owner = "ArenaX-Labs"
repo = "rlmesh"
