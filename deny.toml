[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-unknown-linux-musl",
  "aarch64-unknown-linux-musl",
  "x86_64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]
no-default-features = true
features = ["abi3-py311"]

[advisories]
yanked = "deny"
unmaintained = "workspace"
unused-ignored-advisory = "deny"
ignore = []

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "allow"
unused-license-exception = "deny"
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "0BSD",
  "BSL-1.0",
  "Zlib",
  "bzip2-1.0.6",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
]
exceptions = [
  # pyo3-stub-gen pulls Unicode name data through rustpython-parser for stub checks.
  { crate = "unicode_names2@1.3.0", allow = ["Unicode-DFS-2016"] },
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
highlight = "simplest-path"

# Architecture boundary: only protocol-aware crates may depend on rlmesh-proto
# directly. rlmesh-python is protocol-aware: it stamps handshake PeerInfo and
# serializes the runtime's session telemetry onto the wire TelemetryWindow.
deny = [
  { name = "rlmesh-proto", wrappers = [
    "rlmesh",
    "rlmesh-grpc",
    "rlmesh-runtime",
    "rlmesh-python",
  ] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
