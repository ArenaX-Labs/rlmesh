[profile]
description = "Tensor conversion performance artifacts across the numpy/torch/jax backends."
environments = ["perf-numpy-py311", "perf-torch-py311", "perf-jax-py311"]

[environments.perf-numpy-py311]
tier = "basic"
python = "3.11"
dependencies = ["numpy"]
scenarios = ["perf-tensor-numpy-readonly", "perf-tensor-numpy-copy"]
warmups = 2
samples = 5
timeout_seconds = 300

[environments.perf-torch-py311]
tier = "torch"
python = "3.11"
dependencies = ["numpy", "torch"]
dependency_args = ["--torch-backend", "cpu"]
scenarios = ["perf-tensor-torch-readonly", "perf-tensor-torch-copy"]
warmups = 2
samples = 5
timeout_seconds = 420

[environments.perf-jax-py311]
tier = "jax"
python = "3.11"
dependencies = ["numpy", "jax"]
scenarios = ["perf-tensor-jax-readonly", "perf-tensor-jax-copy"]
warmups = 2
samples = 5
timeout_seconds = 420

[scenarios.perf-tensor-numpy-readonly]
kind = "artifact"
description = "NumPy read-only shared tensor view timing."
artifact = "tensor-numpy-readonly"

[scenarios.perf-tensor-numpy-copy]
kind = "artifact"
description = "Tensor -> NumPy writable copy timing."
artifact = "tensor-numpy-copy"

[scenarios.perf-tensor-torch-readonly]
kind = "artifact"
description = "Torch shared tensor view timing."
artifact = "tensor-torch-readonly"

[scenarios.perf-tensor-torch-copy]
kind = "artifact"
description = "Tensor -> Torch writable copy timing."
artifact = "tensor-torch-copy"

[scenarios.perf-tensor-jax-readonly]
kind = "artifact"
description = "JAX shared immutable tensor import timing."
artifact = "tensor-jax-readonly"

[scenarios.perf-tensor-jax-copy]
kind = "artifact"
description = "Tensor -> JAX copy timing."
artifact = "tensor-jax-copy"
