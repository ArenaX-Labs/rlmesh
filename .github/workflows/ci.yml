name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          install_args: rust python uv buf protoc

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Sync Python environment
        run: uv sync --group dev

      - name: Static checks
        run: mise run check

      - name: Unit and integration tests
        run: mise run test

      - name: Python API contract tests
        run: mise run test:python:api-contract

      - name: System harness tests
        run: mise run test:system:harness

      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  package:
    name: Rust Package Verification
    runs-on: ubuntu-latest
    needs: fast
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          install_args: rust python protoc

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Rust package verification
        run: mise run release:rust:package
