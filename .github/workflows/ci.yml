name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scope mise to repository config
        run: echo "MISE_IGNORED_CONFIG_PATHS=$HOME/.config/mise/config.toml" >> "$GITHUB_ENV"

      - name: Install mise
        uses: jdx/mise-action@v4.1.0
        with:
          version: 2026.6.12
          install: true
          install_args: --locked
          cache_key: >-
            {{cache_key_prefix}}-{{platform}}-{{version}}-{{install_args_hash}}-${{ hashFiles('mise.lock') }}

          cache: true

      - name: Install Rust components
        run: rustup component add --toolchain 1.96.0 rustfmt clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Sync Python environment
        run: mise run --skip-tools setup:python

      - name: Static checks
        run: mise run --skip-tools check

      - name: Unit, integration, and conformance tests
        run: mise run --skip-tools test

      - name: Python API surface tests
        run: mise run --skip-tools test:python:api-surface

      - name: System harness tests
        run: mise run --skip-tools test:system:harness

      - name: Docs build
        run: mise run --skip-tools docs:build

      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  package:
    name: Rust Package Verification
    runs-on: ubuntu-latest
    needs: fast
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scope mise to repository config
        run: echo "MISE_IGNORED_CONFIG_PATHS=$HOME/.config/mise/config.toml" >> "$GITHUB_ENV"

      - name: Install mise
        uses: jdx/mise-action@v4.1.0
        with:
          version: 2026.6.12
          install: true
          install_args: --locked
          cache_key: >-
            {{cache_key_prefix}}-{{platform}}-{{version}}-{{install_args_hash}}-${{ hashFiles('mise.lock') }}

          cache: true

      - name: Install Rust components
        run: rustup component add --toolchain 1.96.0 rustfmt clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Rust package verification
        run: mise run --skip-tools release:rust:package
