name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  fast:
    name: Fast Checks
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache uv packages
        uses: actions/cache@v5
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}-

      - name: Sync Python environment
        run: uv sync --group dev

      - name: Static checks
        run: mise run check

      - name: Unit and integration tests
        run: mise run test

      - name: Python API contract tests
        run: mise run test:python:api-contract

      - name: System harness tests
        run: mise run test:system:harness

      - name: Rust package verification
        run: mise run release:rust:package

      - name: Minimize uv cache
        run: uv cache prune --ci
