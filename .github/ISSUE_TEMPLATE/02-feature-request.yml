name: Idea / request
description: Suggest an improvement, new capability, or change for RLMesh.
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Larger API, architecture, dependency, or roadmap changes are best raised here before implementation work.
  - type: textarea
    id: idea
    attributes:
      label: Idea
      description: What are you trying to do, what is missing today, and what would you like RLMesh to do? Link related projects, use cases, or alternatives if useful.
    validations:
      required: true
