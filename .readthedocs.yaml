version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  jobs:
    create_environment:
      - pip install uv
    install:
      - uv sync --only-group docs
    build:
      html:
        - uv run --only-group docs sphinx-build -E -a -b dirhtml -W --keep-going docs $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
