syntax = "proto3";

package rlmesh.spaces.v1;

// Self-describing metadata value for RLMesh info/option channels.
//
// Replaces google.protobuf.Struct, which collapsed integers and floats through
// a single JSON number: it preserves Python int/float/bool/str/bytes and nested
// containers exactly, at any magnitude. An unset oneof encodes a null/None
// value.
message MetaValue {
  oneof kind {
    int64 int = 1;
    double float = 2;
    string str = 3;
    bool bool = 4;
    bytes bytes = 5;
    MetaList list = 6;
    MetaMap map = 7;
  }
}

message MetaList {
  repeated MetaValue items = 1;
}

message MetaMap {
  map<string, MetaValue> entries = 1;
}
