syntax = "proto3";

package rlmesh.core.v1;

import "rlmesh/spaces/v1/meta.proto";
import "rlmesh/spaces/v1/spaces.proto";

message EnvSpec {
  string id = 1;
  rlmesh.spaces.v1.SpaceSpec action_space = 2;
  rlmesh.spaces.v1.SpaceSpec observation_space = 3;
  rlmesh.spaces.v1.MetaMap metadata = 4;
}

message EnvContract {
  EnvSpec spec = 1;
  // Number of vectorized lanes the runtime drives. Optional so a genuine
  // "unspecified" is distinguishable from a nonsensical 0.
  optional uint32 num_envs = 2;
  string render_mode = 3;
  // Autoreset mode the runtime uses for each lane. Derived at construction from
  // the env's metadata["autoreset_mode"]. UNSPECIFIED is treated as DISABLED.
  // Determinism stays owned by the runtime/route and is not a field here.
  AutoresetMode autoreset_mode = 4;
}

enum AutoresetMode {
  AUTORESET_MODE_UNSPECIFIED = 0;
  // Terminal obs + `terminated` at step t; the env internally resets the done
  // lane and delivers the fresh obs at t+1.
  AUTORESET_MODE_NEXT_STEP = 1;
  // Reset obs is delivered in the same step the lane reports done (the terminal
  // obs moves to final_info). Reserved in the enum; not honored yet.
  AUTORESET_MODE_SAME_STEP = 2;
  // No autoreset; a done lane stays inactive until an explicit reset.
  AUTORESET_MODE_DISABLED = 3;
}
