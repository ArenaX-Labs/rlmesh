syntax = "proto3";

package rlmesh.core.v1;

// === Metric identity ===

// Stable, comparable metric identity. Open enum: unknown integers are preserved
// on the wire (proto3 open-enum semantics), NOT coerced to UNSPECIFIED.
//
// CONTRACT: an emitter that sets a non-UNSPECIFIED `key` MUST also populate the
// matching `key_name` field on the summary messages (TimingSummary /
// MetricSummary) with the canonical string, so a peer that does not recognize
// the enum value still has a stable string handle. Readers treat an unrecognized
// `key` as opaque and consult `key_name`.
//
// Banding (decade-ish, mirrors DType's documented banding ethos):
//   1-9   transport / endpoint timing
//   10-19 phase split (model wait, env step, round trip)
//   20-29 throughput / saturation gauges
//   30-39 byte volumes
// New kinds take the next free slot in the right band. Adding a value is
// additive forever (open enum); old readers keep the raw int + key_name.
enum MetricKey {
  METRIC_KEY_UNSPECIFIED = 0;
  METRIC_KEY_ENDPOINT_TOTAL = 1; // endpoint-local op duration (today's only metric)
  METRIC_KEY_RPC_TOTAL = 2; // runtime-observed RPC round-trip for an op
  METRIC_KEY_MODEL_WAIT = 10; // time the runtime waited on the model
  METRIC_KEY_ENV_STEP = 11; // time the env spent in step/reset
  METRIC_KEY_ROUND_TRIP = 12; // model_wait + env_step per step
  METRIC_KEY_STEPS_PER_SECOND = 20;
  METRIC_KEY_BATCH_SIZE = 21; // lanes per step (num_envs / slot count)
  METRIC_KEY_QUEUE_DEPTH = 22; // in-flight predict depth (concurrent driver only)
  METRIC_KEY_REQUEST_BYTES = 30;
  METRIC_KEY_RESPONSE_BYTES = 31;
}

// Unit of a metric VALUE. Partial: duration_ns/byte_count already imply their
// unit by arm; this disambiguates the `number` arm and any future gauge.
enum Unit {
  UNIT_UNSPECIFIED = 0;
  UNIT_NANOSECONDS = 1;
  UNIT_BYTES = 2;
  UNIT_COUNT = 3;
  UNIT_PER_SECOND = 4;
  UNIT_RATIO = 5;
}

// === Windowed / session summaries (the data consumers actually want) ===
//
// Per-step telemetry rides the hot path as a single
// `optional uint64 endpoint_total_ns` on JoinResponse (see env/model
// interaction.proto), not a nested message. The aggregate/windowed channel
// below — TimingSummary / MetricSummary / TelemetryWindow — is the only
// structured telemetry shape on the wire.

// Aggregated duration metric over a window or session. ms-based to mirror the
// host TimingSummary. Percentile fields are `optional` to preserve the host's
// present/absent distinction (`Option<f64>`).
message TimingSummary {
  string operation = 1;
  string component_id = 2; // runtime-authoritative here (unlike per-step)
  MetricKey key = 3;
  string key_name = 4;
  uint64 sample_count = 5;
  optional double avg_ms = 6;
  optional double p50_ms = 7;
  optional double p95_ms = 8;
  optional double p99_ms = 9;
}

// Aggregated non-duration metric (byte counts, generic numbers). Kept SEPARATE
// from TimingSummary so ms-vs-bytes semantics are never muddled (mirrors the
// host's TimingSummary/MetricSummary split).
message MetricSummary {
  string operation = 1;
  string component_id = 2;
  MetricKey key = 3;
  string key_name = 4;
  Unit unit = 5;
  uint64 sample_count = 6;
  optional double avg = 7;
  optional double p50 = 8;
  optional double p95 = 9;
  optional double p99 = 10;
}

// One telemetry window (cadence-emitted) or the final session total
// (is_session_total = true). Modeled on the host TelemetryWindowEvent struct.
//
// reconnects/drops are intentionally OMITTED: the host hardcodes them to 0
// today, so per the no-scaffolding rule they are added additively (at the next
// free tags) once the runtime actually tracks them.
message TelemetryWindow {
  string session_id = 1;
  string route_id = 2;
  string env_component_id = 3;
  string model_component_id = 4;
  uint32 window_seconds = 5;
  uint64 sample_count = 6;

  optional double steps_per_second = 7;
  optional double request_bytes_per_second = 8;
  optional double response_bytes_per_second = 9;

  repeated TimingSummary timings = 10; // includes model_wait/env_step/round_trip rows
  repeated MetricSummary metrics = 11;

  bool is_session_total = 12;
}
