syntax = "proto3";

package rlmesh.env.v1;

import "rlmesh/env/v1/contract.proto";
import "rlmesh/env/v1/interaction.proto";

message HandshakeRequest {
  string protocol_generation = 1;
  string client_name = 2;
  string client_version = 3;
  map<string, string> capabilities = 4;

  // Every workflow edition the client can operate under. The server selects
  // the highest mutual edition; an empty intersection fails the handshake.
  repeated string supported_workflow_editions = 6;

  // The client's pin for the edition it was built against: SHA-256 of the spec
  // document and its lifecycle status ("provisional" | "sealed"). The server
  // rejects a provisional handshake whose checksum does not match its own
  // build; older clients that omit these fail closed.
  string offered_edition_spec_sha256 = 7;
  string offered_edition_status = 8;
}

message HandshakeResponse {
  bool compatible = 1;
  string server_protocol_generation = 2;
  string min_supported_protocol_generation = 3;
  string error_message = 4;
  map<string, string> capabilities = 5;
  rlmesh.env.v1.EnvContract env_contract = 6;

  // Workflow editions the server supports, for diagnostics on failure.
  repeated string supported_workflow_editions = 8;

  // Edition governing this session; empty when compatible is false.
  string selected_workflow_edition = 9;

  // Server package version, for diagnostics (e.g. naming which peer is a beta
  // build on a provisional-edition mismatch).
  string server_version = 10;

  // SHA-256 of the selected edition's spec document and its lifecycle status
  // ("provisional" | "sealed"). A provisional edition interoperates only between
  // peers carrying the same checksum; both are empty when compatible is false.
  string selected_edition_spec_sha256 = 11;
  string selected_edition_status = 12;
}

message ShutdownRequest {
  string reason = 1;
}

message ShutdownResponse {
  bool accepted = 1;
  string message = 2;
}

service EnvService {
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
  rpc Join(stream JoinRequest) returns (stream JoinResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}
