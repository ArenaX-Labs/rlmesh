syntax = "proto3";

package rlmesh.model.v1;

import "rlmesh/core/v1/env_contract.proto";
import "rlmesh/spaces/v1/value.proto";

// Runtime-owned adapter execution context.
//
// An adapter is the resolved model-side context for one connected env container
// (single OR vector env), keyed by `env_id`. Predict requests carry an ordered
// `episode_ids` vector (see PredictRequest) when the observation/action payload
// is batched; the lane/slot positional index is no longer a wire concept.
message AdapterContext {
  // Correlation only; OSS does not key on it (the managed layer owns session
  // lifecycle). Kept on the wire so closed can correlate.
  string session_id = 1;
  // The connected env container this adapter serves (UUIDv7, minted by the
  // runtime on env attach). The single model-facing routing key; replaces the
  // old route_id + positional lane/slot.
  string env_id = 2;
  // The producer's correlation id for this request. The model client copies it
  // onto the envelope `JoinRequest.request_id` (tag 5) — the field the server
  // demuxes responses on and the authoritative correlation id — and it is echoed
  // back inside `PredictResponse.context`. It rides here (not only on the
  // envelope) because the client API takes a `PredictRequest`, so this is the
  // producer's channel for assigning and reading back the id (e.g. the runtime's
  // phase/step-labeled ids and its env-mismatch error). Both copies always
  // carry the same value; tag 5 is authoritative for response routing.
  string request_id = 3;
}

message ResolveAdapterRequest {
  // The env whose adapter is being resolved. env_id is required. Idempotent
  // upsert: creates the adapter on first call, updates it on later calls. Must
  // precede the first Predict for that env.
  AdapterContext context = 1;

  // Stable env spec for all later Predict calls on this env. The model only
  // needs the observation/action interface; the runtime owns the orchestration
  // knobs (num_envs/render_mode/autoreset) and never forwards them here.
  rlmesh.core.v1.EnvSpec env_spec = 2;

  // The env's selected workflow edition, decided at bind time by the runtime.
  // The runtime re-frames env<->model traffic (prost drops fields it doesn't
  // know), so the session runs at the FLOOR all three speak — the highest edition
  // mutual across env, model, AND the runtime — never the env<->model pairwise
  // max. This is AUTHORITATIVE over the model's own (pairwise) handshake result;
  // the model pins to it.

  // Highest mutual workflow edition across env, model, and runtime (the floor).
  string selected_workflow_edition = 4;

  // Replay horizon h, chosen by the runtime and pinned here (runtime-local
  // scheduling, exactly like selected_workflow_edition above). When h > 1 AND the
  // model defines a chunk corner (predict_chunk / predict_chunk_batch), a Predict
  // emits min(K, h) per-step frames in PredictResponse.actions: actions[0] is
  // THIS step, actions[1..] the open-loop replay frames the runtime buffers and
  // replays without re-calling the model. 0 or 1 (the default) = no chunking
  // (predict every step), byte/behaviour-identical to a model with no chunk
  // corner. The runtime bounds it to MAX_HORIZON.
  uint32 action_horizon = 7;
}

message ResolveAdapterResponse {}

// Observation sent from the runtime to the model.
message PredictRequest {
  // Runtime adapter identity. Responses must mirror this context.
  AdapterContext context = 1;

  // Observation data encoded per env observation space. A single SpaceValue
  // already batched over all rows (the batch axis lives INSIDE the SpaceValue).
  rlmesh.spaces.v1.SpaceValue observation = 2;

  // Ordered per-row episode ids: the self-describing batch. Row `i` of the
  // batched observation belongs to episode `episode_ids[i]`, decided per tick.
  // The model keys all per-episode state (frame-stack buffers) by this id, never
  // by position-across-ticks. Length == the batch row count (num_envs). One id
  // for a single env. Minted by the runtime (UUIDv7); never repeats.
  repeated string episode_ids = 3;
}

message PredictResponse {
  // Adapter identity copied from the request this action answers. Actions
  // inherit the request's `episode_ids` order positionally.
  AdapterContext context = 1;

  // Ordered action frames for this predict: actions[0] is THIS step, actions[1..]
  // are open-loop replay frames. Length 1 = no chunking. Each element is a single
  // SpaceValue already batched over all num_envs lanes/episodes (the lane/batch axis
  // lives INSIDE each SpaceValue; this repeated axis is TIME/chunk-frame).
  repeated rlmesh.spaces.v1.SpaceValue actions = 2;
}

// One request carrying N independent predict groups (control-plane-decided
// grouping). Each group is a complete, already-routed `PredictRequest` the
// server processes against its OWN env's spec — like a DB GROUP BY: the model
// keeps every resolved EnvSpec/adapter and demuxes each group by its `env_id`,
// so no spec ever rides the predict. Purely additive: a peer that never sends
// this still uses single `predict`, and an old server that does not understand
// the arm leaves `kind` unset (the client treats that as an unexpected message,
// never as a silent drop).
message GroupedPredictRequest {
  repeated PredictRequest groups = 1;
}

// Per-group outcome; `results[i]` corresponds to
// `GroupedPredictRequest.groups[i]` in order. A single bad group reports its own
// error here and does NOT sink the others (per-group results, not all-or-
// nothing). A whole-request failure (e.g. malformed envelope) still surfaces as
// `JoinResponse.error`.
message GroupedPredictResult {
  oneof outcome {
    PredictResponse response = 1;
    ModelError error = 2;
  }
}

message GroupedPredictResponse {
  repeated GroupedPredictResult results = 1;
}

message ReleaseAdapterRequest {
  AdapterContext context = 1;
  string reason = 2;
}

message ReleaseAdapterResponse {}

// Drop per-episode adapter state (frame-stack buffers) for an env. With
// `episode_ids` non-empty, evict exactly those keys; empty evicts ALL of the
// env's episode state. The adapter itself stays resolved (use ReleaseAdapter to
// remove it). Because UUIDv7 ids never repeat, a missed/late ResetAdapter only
// leaks memory — it can never alias a new episode — so this is GC, not a
// correctness gate; the runtime fires it without blocking the predict pipeline.
message ResetAdapterRequest {
  AdapterContext context = 1;
  repeated string episode_ids = 2;
}

message ResetAdapterResponse {}

// Request graceful shutdown of the model participant after the runtime reaches
// a normal terminal condition. Fault paths may still rely on pod/runtime
// timeouts.
message CloseParticipantRequest {
  string reason = 1;
}

message CloseParticipantResponse {}

// Bands (aligned with EnvErrorCode; UNSPECIFIED and shared concepts share
// numbers across the two enums): 0 = unspecified; 1-9 client/recoverable;
// 10-19 fatal/internal. The bands are a labeling convention only: a model
// handler fault is reported as INTERNAL (10) with an explicit `is_recoverable`
// flag, so recoverability is NOT derivable from the code. Readers MUST consult
// the `is_recoverable` field on ModelError.
enum ModelErrorCode {
  MODEL_ERROR_CODE_UNSPECIFIED = 0;
  MODEL_ERROR_CODE_INVALID_REQUEST = 2;
  MODEL_ERROR_CODE_NOT_CONFIGURED = 3;
  MODEL_ERROR_CODE_BUSY = 4;
  MODEL_ERROR_CODE_INTERNAL = 10;
  MODEL_ERROR_CODE_CANCELLED = 12;
  MODEL_ERROR_CODE_CLOSED = 13;
}

message ModelError {
  ModelErrorCode code = 1;
  string message = 2;
  bool is_recoverable = 3;
  string debug_info = 4;
}

message JoinRequest {
  oneof kind {
    ResolveAdapterRequest resolve_adapter = 1;
    PredictRequest predict = 2;
    ReleaseAdapterRequest release_adapter = 3;
    CloseParticipantRequest close = 4;
    // Additive: a batch of independent predict groups across resolved adapters.
    // Absence is exactly today's behavior (single `predict`). Tag 5 is the
    // sibling `request_id` scalar, not an oneof arm, so 6 is the first free arm.
    GroupedPredictRequest grouped_predict = 6;
    // Drop per-episode adapter state, keyed by env_id. Tag 7 is the next free
    // arm after grouped_predict.
    ResetAdapterRequest reset_adapter = 7;
  }

  // Per-message correlation id, harmonized to tag 5 across all four Join
  // messages (env + model, request + response). 1-byte tag on the hot path.
  // A `grouped_predict` carries its OWN envelope id here (never a group's), so
  // the one-response-per-request_id demux invariant holds.
  string request_id = 5;
}

message JoinResponse {
  oneof kind {
    ResolveAdapterResponse resolve_adapter = 1;
    PredictResponse predict = 2;
    ReleaseAdapterResponse release_adapter = 3;
    CloseParticipantResponse close = 4;
    // Additive: per-group results answering a GroupedPredictRequest. Tags 5/6
    // are the sibling request_id/endpoint_total_ns scalars; 7 is the first free
    // oneof arm (error stays at 10).
    GroupedPredictResponse grouped_predict = 7;
    // Acks a ResetAdapterRequest. Tag 8 is the next free arm.
    ResetAdapterResponse reset_adapter = 8;
    ModelError error = 10;
  }

  // Per-message correlation id, harmonized to tag 5 (was 21).
  string request_id = 5;

  // Hot per-step endpoint-local op duration, in nanoseconds. A bare scalar is
  // the cheapest forward-compatible wire shape (one varint key + one varint
  // value, no nested framing, no string), carrying per-step timing without a
  // nested message. `optional` preserves "no timing available" vs "0 ns".
  optional uint64 endpoint_total_ns = 6;
}
