[advisories]
# Accepted informational warnings:
# These six advisories are all unmaintained rust-unic crates pulled in through
# pyo3-stub-gen 0.22.3 -> rustpython-parser 0.4.0. pyo3-stub-gen is already at
# the latest release, and RustSec lists no patched versions for these advisories.
ignore = [
  "RUSTSEC-2025-0075", # unic-char-range
  "RUSTSEC-2025-0080", # unic-common
  "RUSTSEC-2025-0081", # unic-char-property
  "RUSTSEC-2025-0090", # unic-emoji-char
  "RUSTSEC-2025-0098", # unic-ucd-version
  "RUSTSEC-2025-0100", # unic-ucd-ident
  # pyo3 0.28 advisories, both fixed in pyo3 0.29. The upgrade is blocked
  # on a pyo3-stub-gen release that supports pyo3 0.29 (0.22.3 does not
  # compile against it); remove both entries when bumping pyo3.
  # 0176: out-of-bounds read in nth/nth_back on PyList/PyTuple iterators.
  # rlmesh iterates these only with plain for loops (next), never
  # nth/nth_back or adapters that call them (skip, step_by).
  # 0177: missing Sync bound on PyCFunction::new_closure closures.
  # rlmesh never calls new_closure.
  "RUSTSEC-2026-0176", # pyo3
  "RUSTSEC-2026-0177", # pyo3
]

[output]
deny = ["warnings"]
format = "terminal"
quiet = false
show_tree = true
